# site properties and page defaults
title: mivlab
subtitle: Machine Intelligence and Vision Laboratory @ CBNU
socialtitle:  MIVLab
description: Machine Intelligence and Vision Laboratory 
header: images/background.jpg
footer: images/banner.jpg
logo: images/logo.png
show-title: false
show-subtitle: true
logo-text: true

proofer: false
url: https://khanlab.bio
baseurl:

# site social media and other links
